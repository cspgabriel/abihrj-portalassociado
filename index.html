<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <!-- Autor: Gabriel Salles -->
    <!-- Suporte do SO: Windows11 -->
    <!-- Descrição: Arquivo HTML principal com suporte a PWA -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="theme-color" content="#004aad" />
    <meta name="description" content="Portal exclusivo para associados HoteisRio acessarem benefícios, notícias e suporte." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>HoteisRio - Portal do Associado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #f3f6f9;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
      }
      .loading-text {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
    </style>
    <!-- Deploy fix v2.2: Security Headers Implementation -->
  </head>
  <body>
    <div id="root">
      <!-- Fallback visual enquanto o React carrega -->
      <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #004aad; font-family: 'Inter', sans-serif;">
        <svg class="animate-spin" style="width: 40px; height: 40px; margin-bottom: 16px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="loading-text font-semibold">Carregando Portal HoteisRio...</p>
      </div>
    </div>
    <!-- Script essencial para iniciar a aplicação -->
    <script type="module" src="./index.tsx"></script>
    
    <!-- PWA Service Worker Registration Fallback -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((reg) => console.log('SW registered: ', reg))
            .catch((err) => console.log('SW registration failed: ', err));
        });
      }
    </script>
  </body>
</html>
